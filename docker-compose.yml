services:
  api:
    build:
      context: .
      target: ${DOCKER_BUILD_TARGET}
    image: ${API_IMAGE_NAME}:${API_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${API_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    ports:
      - "${DOCKER_BIND_IP}:${API_EXTERNAL_PORT}:${API_INTERNAL_PORT}"
    deploy:
      resources:
        reservations:
          cpus: '${API_CPU_RESERVATION}'
          memory: '${API_MEM_RESERVATION}'
        limits:
          cpus: '${API_CPU_LIMIT}'
          memory: '${API_MEM_LIMIT}'
    logging:
      driver: "json-file"
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    environment:
      - APP_ENV=${APP_ENV}
      - APP__DEBUG=${APP__DEBUG}
      - LOG_LEVEL=${LOG_LEVEL}
      - DB__USER=${DB__USER}
      - DB__PASSWORD=${DB__PASSWORD}
      - DB__NAME=${DB__NAME}
      - DB__HOST=${DB_SERVICE_NAME}
      - DB__PORT=${DB_INTERNAL_PORT}
      - REDIS__HOST=${CACHE_SERVICE_NAME}
      - REDIS__PORT=${CACHE_INTERNAL_PORT}
      - OTLP_ENDPOINT=${OTLP_ENDPOINT}
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
            # -----------------------------------------------------------------------
            # ARCHITECT ALERT: LOCAL DEVELOPMENT (LIVE RELOAD)
            # Uncomment the volumes block below to enable live-reload.
            # WARNING: Since the container runs as 'appuser' (not root), ensure your
            # host directory has the correct permissions if the app needs to write 
            # files back to the host, otherwise you will get 'Permission Denied'.
            # -----------------------------------------------------------------------
            # volumes:
            #   - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app-network

  worker:
    build:
      context: .
      target: ${DOCKER_BUILD_TARGET}
    image: ${WORKER_COMPANY_IMAGE_NAME}:${WORKER_COMPANY_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${WORKER_COMPANY_SERVICE_NAME}
    restart: "on-failure"
    deploy:
      resources:
        reservations:
          cpus: '${WORKER_COMPANY_CPU_RESERVATION}'
          memory: '${WORKER_COMPANY_MEM_RESERVATION}'
        limits:
          cpus: '${WORKER_COMPANY_CPU_LIMIT}'
          memory: '${WORKER_COMPANY_MEM_LIMIT}'
    logging:
      driver: "json-file"
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    command: ["python", "-m", "src.shared.presentation.cli", "sync-companies"]
    environment:
      - APP_ENV=${APP_ENV}
      - DB__USER=${DB__USER}
      - DB__PASSWORD=${DB__PASSWORD}
      - DB__NAME=${DB__NAME}
      - DB__HOST=${DB_SERVICE_NAME}
      - DB__PORT=${DB_INTERNAL_PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: ${DB_IMAGE_NAME}:${DB_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${DB_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        reservations:
          cpus: '${DB_CPU_RESERVATION}'
          memory: '${DB_MEM_RESERVATION}'
        limits:
          cpus: '${DB_CPU_LIMIT}'
          memory: '${DB_MEM_LIMIT}'
    environment:
      - POSTGRES_USER=${DB__USER}
      - POSTGRES_PASSWORD=${DB__PASSWORD}
      - POSTGRES_DB=${DB__NAME}
    ports:
      - "${DOCKER_BIND_IP}:${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    networks:
      - app-network
    volumes:
      - db-data:${DB_FOLDER}

  cache:
    image: ${CACHE_IMAGE_NAME}:${CACHE_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${CACHE_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        reservations:
          memory: '${CACHE_MEM_RESERVATION}'
        limits:
          memory: '${CACHE_MEM_LIMIT}'
    ports:
      - "${DOCKER_BIND_IP}:${CACHE_EXTERNAL_PORT}:${CACHE_INTERNAL_PORT}"
    networks:
      - app-network
    volumes:
      - cache-data:${CACHE_FOLDER}

  db-admin:
    profiles: ["admin"]
    image: ${DB_ADMIN_IMAGE_NAME}:${DB_ADMIN_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${DB_ADMIN_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        reservations:
          memory: '${DB_ADMIN_MEM_RESERVATION}'
        limits:
          memory: '${DB_ADMIN_MEM_LIMIT}'
    environment:
      - PGADMIN_DEFAULT_EMAIL=${DB_ADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${DB_ADMIN_PASSWORD}
      - PGADMIN_SERVER_MODE=True
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_SERVER_JSON_FILE=/tmp/servers.json
      - PGADMIN_REPLACE_SERVERS_ON_STARTUP=True
      - POSTGRES_DB=${DB__NAME}
      - POSTGRES_USER=${DB__USER}
      - DB_INTERNAL_PORT=${DB_INTERNAL_PORT}
      - DB_SERVICE_NAME=${DB_SERVICE_NAME}
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "sed \"s/\\$${POSTGRES_USER}/$${POSTGRES_USER}/g; s/\\$${POSTGRES_DB}/$${POSTGRES_DB}/g; s/\\$${DB_INTERNAL_PORT}/$${DB_INTERNAL_PORT}/g\" /pgadmin4/servers.json.template > /tmp/servers.json && /entrypoint.sh"
    ports:
      - "${DOCKER_BIND_IP}:${DB_ADMIN_EXTERNAL_PORT}:${DB_ADMIN_INTERNAL_PORT}"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - db-admin-data:${DB_ADMIN_FOLDER}
      - ./monitoring/pgadmin/servers.json.template:/pgadmin4/servers.json.template

  metrics:
    profiles: ["observability"]
    image: ${METRICS_IMAGE_NAME}:${METRICS_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${METRICS_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    user: "0:0"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=${METRICS_RETENTION_TIME}'
    ports:
      - "${DOCKER_BIND_IP}:${METRICS_EXTERNAL_PORT}:${METRICS_INTERNAL_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    depends_on:
      - alertmanager
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./monitoring/prometheus/alert_rules.yml:/etc/prometheus/alert_rules.yml
      - metrics-data:${METRICS_FOLDER}

  metrics-ingestion:
    profiles: ["observability"]
    image: ${METRICS_INGESTION_IMAGE_NAME}:${METRICS_INGESTION_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${METRICS_INGESTION_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        reservations:
          memory: '${METRICS_INGESTION_MEM_RESERVATION}'
        limits:
          memory: '${METRICS_INGESTION_MEM_LIMIT}'
    ports:
      - "${DOCKER_BIND_IP}:${METRICS_INGESTION_EXTERNAL_PORT}:${METRICS_INGESTION_INTERNAL_PORT}"
    networks:
      - app-network

  logs-ingestion:
    profiles: ["observability"]
    image: ${LOGS_INGESTION_IMAGE_NAME}:${LOGS_INGESTION_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${LOGS_INGESTION_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    ports:
      - "${DOCKER_BIND_IP}:${LOGS_INGESTION_EXTERNAL_PORT}:${LOGS_INGESTION_INTERNAL_PORT}"
    networks:
      - app-network
    command: -config.file=/etc/loki/local-config.yaml
    deploy:
      resources:
        reservations:
          memory: '${LOGS_INGESTION_MEM_RESERVATION}'
        limits:
          memory: '${LOGS_INGESTION_MEM_LIMIT}'
    volumes:
      - logs-ingestion-data:${LOGS_INGESTION_FOLDER}

  logs-collector:
    profiles: ["observability"]
    image: ${LOGS_COLLECTOR_IMAGE_NAME}:${LOGS_COLLECTOR_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${LOGS_COLLECTOR_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    volumes:
      - /var/log:/var/log
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - app-network
    deploy:
      resources:
        reservations:
          memory: '${LOGS_COLLECTOR_MEM_RESERVATION}'
        limits:
          memory: '${LOGS_COLLECTOR_MEM_LIMIT}'

  observability:
    profiles: ["observability"]
    image: ${OBSERVABILITY_IMAGE_NAME}:${OBSERVABILITY_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${OBSERVABILITY_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    user: "0:0"
    ports:
      - "${DOCKER_BIND_IP}:${OBSERVABILITY_EXTERNAL_PORT}:${OBSERVABILITY_INTERNAL_PORT}"
    environment:
      - GF_SECURITY_ADMIN_USER=${OBSERVABILITY_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${OBSERVABILITY_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - app-network
    depends_on:
      - metrics
      - logs-ingestion
      - traces
      - alertmanager
      - node-exporter
    volumes:
      - observability-data:${OBSERVABILITY_FOLDER}
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

  traces:
    profiles: ["observability"]
    image: ${TRACES_IMAGE_NAME}:${TRACES_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${TRACES_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    command: ["-config.file=/etc/tempo.yaml"]
    deploy:
      resources:
        reservations:
          memory: '${TRACES_MEM_RESERVATION}'
        limits:
          memory: '${TRACES_MEM_LIMIT}'
    ports:
      - "${DOCKER_BIND_IP}:${TRACES_OTLP_GRPC_PORT}:4317"   # OTLP gRPC receiver
      - "${DOCKER_BIND_IP}:${TRACES_OTLP_HTTP_PORT}:4318"   # OTLP HTTP receiver
      - "${DOCKER_BIND_IP}:${TRACES_EXTERNAL_PORT}:${TRACES_INTERNAL_PORT}"  # Tempo API
    networks:
      - app-network
    volumes:
      - ./monitoring/tempo/tempo.yaml:/etc/tempo.yaml
      - traces-data:${TRACES_FOLDER}

  alertmanager:
    profiles: ["observability"]
    image: ${ALERTMANAGER_IMAGE_NAME}:${ALERTMANAGER_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${ALERTMANAGER_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        reservations:
          memory: '${ALERTMANAGER_MEM_RESERVATION}'
        limits:
          memory: '${ALERTMANAGER_MEM_LIMIT}'
    ports:
      - "${DOCKER_BIND_IP}:${ALERTMANAGER_EXTERNAL_PORT}:${ALERTMANAGER_INTERNAL_PORT}"
    networks:
      - app-network
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml
      - alertmanager-data:${ALERTMANAGER_FOLDER}

  node-exporter:
    profiles: ["observability"]
    image: ${INFRASTRUCTURE_AGENT_IMAGE_NAME}:${INFRASTRUCTURE_AGENT_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${INFRASTRUCTURE_AGENT_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        reservations:
          memory: '${INFRASTRUCTURE_AGENT_MEM_RESERVATION}'
        limits:
          memory: '${INFRASTRUCTURE_AGENT_MEM_LIMIT}'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - app-network

volumes:
  db-data:
    name: ${COMPOSE_PROJECT_NAME}-${DB_SERVICE_NAME}-data
  cache-data:
    name: ${COMPOSE_PROJECT_NAME}-${CACHE_SERVICE_NAME}-data
  db-admin-data:
    name: ${COMPOSE_PROJECT_NAME}-${DB_ADMIN_SERVICE_NAME}-data
  metrics-data:
    name: ${COMPOSE_PROJECT_NAME}-${METRICS_SERVICE_NAME}-data
  observability-data:
    name: ${COMPOSE_PROJECT_NAME}-${OBSERVABILITY_SERVICE_NAME}-data
  logs-ingestion-data:
    name: ${COMPOSE_PROJECT_NAME}-${LOGS_INGESTION_SERVICE_NAME}-data
  traces-data:
    name: ${COMPOSE_PROJECT_NAME}-${TRACES_SERVICE_NAME}-data
  alertmanager-data:
    name: ${COMPOSE_PROJECT_NAME}-${ALERTMANAGER_SERVICE_NAME}-data

networks:
  app-network:
    name: ${COMPOSE_PROJECT_NAME}-${PROJECT_NETWORK_NAME}
    driver: bridge

services:
  api:
    build:
      context: .
      target: ${DOCKER_BUILD_TARGET}
    image: ${API_IMAGE_NAME}:${API_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${API_IMAGE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    ports:
      - "${DOCKER_BIND_IP}:${API_EXTERNAL_PORT}:${API_INTERNAL_PORT}"
    deploy:
      resources:
        limits:
          cpus: '${API_CPU_LIMIT}'
          memory: ${API_MEM_LIMIT}
    logging:
      driver: "json-file"
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    environment:
      - APP_ENV=${APP_ENV}
      - APP__DEBUG=${APP__DEBUG}
      - LOG_LEVEL=${LOG_LEVEL}
      - DB__USER=${DB__USER}
      - DB__PASSWORD=${DB__PASSWORD}
      - DB__NAME=${DB__NAME}
      - DB__HOST=${DB_SERVICE_NAME}
      - DB__PORT=${DB_INTERNAL_PORT}
      - REDIS__HOST=${CACHE_SERVICE_NAME}
      - REDIS__PORT=${CACHE_INTERNAL_PORT}
            # -----------------------------------------------------------------------
            # ARCHITECT ALERT: LOCAL DEVELOPMENT (LIVE RELOAD)
            # Uncomment the volumes block below to enable live-reload.
            # WARNING: Since the container runs as 'appuser' (not root), ensure your
            # host directory has the correct permissions if the app needs to write 
            # files back to the host, otherwise you will get 'Permission Denied'.
            # -----------------------------------------------------------------------
            # volumes:
            #   - ./src:/app/src
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    networks:
      - app-network

  worker:
    build:
      context: .
      target: ${DOCKER_BUILD_TARGET}
    image: ${WORKER_COMPANY_IMAGE_NAME}:${WORKER_COMPANY_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${WORKER_COMPANY_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        limits:
          cpus: '${WORKER_COMPANY_CPU_LIMIT}'
          memory: ${WORKER_COMPANY_MEM_LIMIT}
    logging:
      driver: "json-file"
      options:
        max-size: "${DOCKER_LOG_MAX_SIZE}"
        max-file: "${DOCKER_LOG_MAX_FILE}"
    command: ["python", "-m", "src.shared.presentation.cli", "sync-companies"]
    environment:
      - APP_ENV=${APP_ENV}
      - DB__USER=${DB__USER}
      - DB__PASSWORD=${DB__PASSWORD}
      - DB__NAME=${DB__NAME}
      - DB__HOST=${DB_SERVICE_NAME}
      - DB__PORT=${DB_INTERNAL_PORT}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-network

  db:
    image: ${DB_IMAGE_NAME}:${DB_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${DB_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        limits:
          cpus: '${DB_CPU_LIMIT}'
          memory: ${DB_MEM_LIMIT}
    environment:
      - POSTGRES_USER=${DB__USER}
      - POSTGRES_PASSWORD=${DB__PASSWORD}
      - POSTGRES_DB=${DB__NAME}
    ports:
      - "${DOCKER_BIND_IP}:${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB__USER} -d ${DB__NAME}"]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    networks:
      - app-network
    volumes:
      - db-data:${DB_FOLDER}

  cache:
    image: ${CACHE_IMAGE_NAME}:${CACHE_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${CACHE_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: ${CACHE_MEM_LIMIT}
    ports:
      - "${DOCKER_BIND_IP}:${CACHE_EXTERNAL_PORT}:${CACHE_INTERNAL_PORT}"
    networks:
      - app-network
    volumes:
      - cache-data:${CACHE_FOLDER}

  db-admin:
    profiles: ["admin"]
    image: ${DB_ADMIN_IMAGE_NAME}:${DB_ADMIN_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${DB_ADMIN_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    deploy:
      resources:
        limits:
          memory: ${DB_ADMIN_MEM_LIMIT}
    environment:
      - PGADMIN_DEFAULT_EMAIL=${DB_ADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${DB_ADMIN_PASSWORD}
      - PGADMIN_SERVER_MODE=True
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_SERVER_JSON_FILE=/tmp/servers.json
      - PGADMIN_REPLACE_SERVERS_ON_STARTUP=True
      - POSTGRES_USER=${DB__USER}
      - POSTGRES_DB=${DB__NAME}
      - DB_INTERNAL_PORT=${DB_INTERNAL_PORT}
      - DB_SERVICE_NAME=${DB_SERVICE_NAME}
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "sed \"s/\\$${POSTGRES_USER}/$${POSTGRES_USER}/g; s/\\$${POSTGRES_DB}/$${POSTGRES_DB}/g; s/\\$${DB_INTERNAL_PORT}/$${DB_INTERNAL_PORT}/g\" /pgadmin4/servers.json.template > /tmp/servers.json && /entrypoint.sh"
    ports:
      - "${DOCKER_BIND_IP}:${DB_ADMIN_EXTERNAL_PORT}:${DB_ADMIN_INTERNAL_PORT}"
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - db-admin-data:${DB_ADMIN_FOLDER}
      - ./monitoring/pgadmin/servers.json.template:/pgadmin4/servers.json.template

  metrics:
    profiles: ["observability"]
    image: ${METRICS_IMAGE_NAME}:${METRICS_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${METRICS_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    user: "0:0"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=${METRICS_RETENTION_TIME}'
    ports:
      - "${DOCKER_BIND_IP}:${METRICS_EXTERNAL_PORT}:${METRICS_INTERNAL_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - app-network
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - metrics-data:${METRICS_FOLDER}

  observability:
    profiles: ["observability"]
    image: ${OBSERVABILITY_IMAGE_NAME}:${OBSERVABILITY_IMAGE_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_${OBSERVABILITY_SERVICE_NAME}
    restart: ${DOCKER_RESTART_POLICY}
    user: "0:0"
    ports:
      - "${DOCKER_BIND_IP}:${OBSERVABILITY_EXTERNAL_PORT}:${OBSERVABILITY_INTERNAL_PORT}"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${OBSERVABILITY_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - app-network
    depends_on:
      - metrics
    volumes:
      - observability-data:${OBSERVABILITY_FOLDER}
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

volumes:
  db-data:
    name: ${COMPOSE_PROJECT_NAME}-${DB_SERVICE_NAME}-data
  cache-data:
    name: ${COMPOSE_PROJECT_NAME}-${CACHE_SERVICE_NAME}-data
  db-admin-data:
    name: ${COMPOSE_PROJECT_NAME}-${DB_ADMIN_SERVICE_NAME}-data
  metrics-data:
    name: ${COMPOSE_PROJECT_NAME}-${METRICS_SERVICE_NAME}-data
  observability-data:
    name: ${COMPOSE_PROJECT_NAME}-${OBSERVABILITY_SERVICE_NAME}-data

networks:
  app-network:
    name: ${COMPOSE_PROJECT_NAME}-${PROJECT_NETWORK_NAME}
    driver: bridge

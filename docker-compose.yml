services:
  api:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME}_api
    ports:
      - "${API_EXTERNAL_PORT}:${API_INTERNAL_PORT}"
    environment:
      - APP_ENV=${APP_ENV}
      - APP__DEBUG=${APP__DEBUG}
      - LOG_LEVEL=${LOG_LEVEL}
      # Assemble the connection string using dynamic variables
      - DB__URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${DB_INTERNAL_PORT}/${POSTGRES_DB}
      - REDIS__URL=redis://cache:${REDIS_INTERNAL_PORT}/0
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_started
    networks:
      - fly-net

  worker-company-data-source:
    build: .
    container_name: ${COMPOSE_PROJECT_NAME}_worker_company_data_source
    command: ["python", "-m", "src.shared.presentation.cli", "sync-companies"]
    environment:
      - APP_ENV=${APP_ENV}
      - DB__URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:${DB_INTERNAL_PORT}/${POSTGRES_DB}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - fly-net

  db:
    image: postgres:${POSTGRES_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_db
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "${DB_EXTERNAL_PORT}:${DB_INTERNAL_PORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - fly-net
    volumes:
      - fly-db-data:/var/lib/postgresql/data

  cache:
    image: redis:${REDIS_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_cache
    ports:
      - "${REDIS_EXTERNAL_PORT}:${REDIS_INTERNAL_PORT}"
    networks:
      - fly-net
    volumes:
      - fly-cache-data:/data

  db-admin:
    image: dpage/pgadmin4:${PGADMIN_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_db_admin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_PASSWORD}
      - PGADMIN_SERVER_MODE=True
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_SERVER_JSON_FILE=/pgadmin4/servers.json
      - PGADMIN_REPLACE_SERVERS_ON_STARTUP=True
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - DB_INTERNAL_PORT=${DB_INTERNAL_PORT}
    entrypoint:
      - "/bin/sh"
      - "-c"
      - "sed \"s/\\$${POSTGRES_USER}/$${POSTGRES_USER}/g; s/\\$${POSTGRES_DB}/$${POSTGRES_DB}/g; s/\\$${DB_INTERNAL_PORT}/$${DB_INTERNAL_PORT}/g\" /pgadmin4/servers.json.template > /pgadmin4/servers.json && /entrypoint.sh"
    ports:
      - "${PGADMIN_EXTERNAL_PORT}:${PGADMIN_INTERNAL_PORT}"
    networks:
      - fly-net
    depends_on:
      - db
    volumes:
      - fly-db-admin-data:/var/lib/pgadmin
      - ./monitoring/pgadmin/servers.json.template:/pgadmin4/servers.json.template

  metrics:
    image: prom/prometheus:${PROMETHEUS_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_metrics
    user: "0:0"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT}:${PROMETHEUS_INTERNAL_PORT}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fly-net
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - fly-metrics-data:/prometheus

  observability:
    image: grafana/grafana:${GRAFANA_VERSION}
    container_name: ${COMPOSE_PROJECT_NAME}_observability
    user: "0:0"
    ports:
      - "${GRAFANA_EXTERNAL_PORT}:${GRAFANA_INTERNAL_PORT}"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - fly-net
    depends_on:
      - metrics
    restart: unless-stopped
    volumes:
      - fly-observability-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning

volumes:
  fly-db-data:
  fly-cache-data:
  fly-db-admin-data:
  fly-metrics-data:
  fly-observability-data:

networks:
  fly-net:
    driver: bridge

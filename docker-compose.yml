services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/flyai_b3
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - flyai-net

  # Example Worker manifesting the same image
  worker-companies:
    build: .
    command: ["python", "-m", "src.shared.presentation.cli", "sync-companies"] # Placeholder for now
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/flyai_b3
    depends_on:
      - db
    networks:
      - flyai-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=flyai_b3
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flyai-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - flyai-net

networks:
  flyai-net:
    driver: bridge

services:
  api:
    build: .
    ports:
      - "8001:8000"
    environment:
      - DB__URL=postgresql://postgres:postgres@db:5432/flyai_b3
      - REDIS__URL=redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - flyai-net

  # Example Worker manifesting the same image
  worker-companies:
    build: .
    command: ["python", "-m", "src.shared.presentation.cli", "sync-companies"] # Placeholder for now
    environment:
      - DB__URL=postgresql://postgres:postgres@db:5432/flyai_b3
    depends_on:
      - db
    networks:
      - flyai-net

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=flyai_b3
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - flyai-net
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - flyai-net
    volumes:
      - /mnt/gamer_d/FLY.AI_infra/data/redis:/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@fly.ai
      - PGADMIN_DEFAULT_PASSWORD=admin
      - PGADMIN_SERVER_MODE=True
      - PGADMIN_CONFIG_SERVER_MODE=True
      - PGADMIN_SERVER_JSON_FILE=/pgadmin4/servers.json
      - PGADMIN_REPLACE_SERVERS_ON_STARTUP=True
    volumes:
      - pgadmin-data:/var/lib/pgadmin
      - ./monitoring/pgadmin/servers.json:/pgadmin4/servers.json
    ports:
      - "5050:80"
    networks:
      - flyai-net
    depends_on:
      - db

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    user: "0:0"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - /mnt/gamer_d/FLY.AI_infra/data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - flyai-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    user: "0:0"
    ports:
      - "3000:3000"
    volumes:
      - /mnt/gamer_d/FLY.AI_infra/data/grafana:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - flyai-net
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  pgadmin-data:

networks:
  flyai-net:
    driver: bridge

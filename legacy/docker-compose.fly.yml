services:
  fly-dev:
    build:
      context: .
      dockerfile: Dockerfile.fly
    container_name: fly-dev
    working_dir: /app
    volumes:
      - .:/app
    # Opcional: mapear uma pasta de cache/log se quiser
    # - /mnt/linux_d/cache/fly:/cache
    tty: true
    stdin_open: true
    # Rede padrão do Docker é suficiente

